name: Publish Repo Health Badge

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: badge-health-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate doctor badge JSON
        run: |
          mkdir -p .public/badges .artifacts
          bun ./src/bin/cli.ts doctor --workspace --badge-file .public/badges/health.json --json-file .artifacts/doctor.json

      - name: Publish badge artifacts to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .public
          keep_files: true
