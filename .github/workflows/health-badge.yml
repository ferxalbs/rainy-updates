name: Publish Repo Health Badge

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate doctor badge JSON
        run: |
          mkdir -p .public/badges .artifacts
          bun ./src/bin/cli.ts doctor --workspace --badge-file .public/badges/health.json --json-file .artifacts/doctor.json
          cat > .public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Rainy Updates Badge</title>
            </head>
            <body>
              <h1>Rainy Updates Badge</h1>
              <p>
                Badge JSON:
                <a href="./badges/health.json">./badges/health.json</a>
              </p>
            </body>
          </html>
          HTML
          touch .public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .public

  deploy-badge:
    needs: build-badge
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
